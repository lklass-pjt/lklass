spring:
  application:
    name: lklass
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/lklass?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

lklass:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-change-me}
    access-token-ttl: 1h
  policy:
    pending-payment-ttl: 30m
    cancellation-period: 7d
  scheduler:
    course-status-cron: "0 * * * * *"
    pending-expiration-cron: "0 * * * * *"
