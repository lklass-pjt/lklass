services:
  mysql:
    image: mysql:8.4
    container_name: lklass-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: lklass
      MYSQL_ROOT_HOST: "%"
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+09:00
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - lklass-mysql-data:/var/lib/mysql

volumes:
  lklass-mysql-data:
